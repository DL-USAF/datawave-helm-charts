logging:
  level:
    datawave.microservice.authorization: DEBUG
jsd:
  users:
    clearances-enabled: true
    dissemination-controls-enabled: true
    fine-access-controls-enabled: true
    releasable-tos-enabled: true
    class-roles-enabled: true
    use-cac-format: false
mock:
  users:
    global-roles-to-auths:
      Administrator: DW_ADMIN
      AuthorizedUser: AUTH_USER
      JBossAdministrator: JBOSS_ADMIN
      barRole: BAR
      fooRole: FOO
      privateRole: PRIVATE
      PublicRole: PUBLIC
    mockUsers:
      '[cn=test a. user, ou=example developers, o=example corp, c=us<cn=example corp ca, o=example corp, c=us>]':
        Administrator: DW_ADMIN
        AuthorizedUser: DW_USER
        JBossAdministrator: JBOSS_ADMIN
        PRivateRole: PRIVATE
        PublicRole: PUBLIC
      '[cn=testserver.example.com, ou=servers, o=example corp, c=us<cn=example corp ca, o=example corp, c=us>]':
        AuthorizedServer: DW_SERV
        PublicRole: PUBLIC
        PrivateRole: PRIVATE
      '[demo user<null>]':
        roles-to-auths:
          AuthorizedUser: AUTH_USER
          barRole: BAR
          unclassified: U
    server-DN-regex: '.*server.*'
server:
  ssl:
    client-auth: NEED
spring:
  security:
    datawave:
      use-trusted-subject-headers: true
      oauth:
        refreshTokenTtl: 86400
        authCodeTtl: 86400
        idTokenTtl: 86400
